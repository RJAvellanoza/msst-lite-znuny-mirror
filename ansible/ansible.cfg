[defaults]
inventory = inventory/
roles_path = roles/
host_key_checking = False
timeout = 30
stdout_callback = ansible.builtin.default
callback_result_format = yaml
deprecation_warnings = False
forks = 10

[ssh_connection]
pipelining = True
scp_if_ssh = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
